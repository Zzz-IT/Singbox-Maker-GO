name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 【核心修复 1】显式声明权限，允许 Actions 修改仓库内容（创建 Release）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binary
        run: |
          # 编译当前目录 (.)，生成 install.sh 识别的文件名
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o sbgo-${{ matrix.goarch }} .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: sbgo-${{ matrix.goarch }}
          overwrite: true  # <--- 添加这一行，强制覆盖同名文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
